
services:

  # ── MySQL ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:latest
    container_name: tailor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── App (Frontend + Backend combined) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time.
        # Browser calls this, so it must be reachable from the end-user's host.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: tailor-app
    restart: unless-stopped
    ports:
      - "3000:3000"   # Next.js frontend
      - "5000:5000"   # Express API
    environment:
      NODE_ENV: production
      # Backend runtime env
      PORT: 5000
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASS}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_PORT: 3306
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      # Frontend runtime env
      HOSTNAME: "0.0.0.0"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      # Check both services are alive
      test: >
        wget --no-verbose --tries=1 --spider http://localhost:5000/health &&
        wget --no-verbose --tries=1 --spider http://localhost:3000
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
    driver: local
